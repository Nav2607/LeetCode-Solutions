name: Update LeetCode Table

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate Table
        run: |
          cat << 'EOF' > update_readme.py
          import os, re
          from datetime import datetime

          folders = [f for f in os.listdir('.') if os.path.isdir(f) and re.match(r'^\d+-', f)]
          folders.sort(key=lambda x: int(x.split('-')[0]))

          # Set up the exact header template you requested
          table_lines = [
              "| # | Title | Language(s) | Difficulty | Date |",
              "|---|---------|-------------|----------|-------|"
          ]
          
          for folder in folders:
              num, name = folder.split('-', 1)
              clean_name = name.replace('-', ' ').title()
              
              # Find code files inside the folder
              langs = []
              for root, _, files in os.walk(folder):
                  for file in files:
                      if file.endswith('.java'): langs.append('Java')
                      elif file.endswith('.py'): langs.append('Python')
                      elif file.endswith('.c'): langs.append('C')
              langs = ', '.join(sorted(list(set(langs)))) or 'Unknown'
              
              # Extract difficulty from the sub-folder's README markdown
              difficulty = 'Unknown'
              sub_readme_path = os.path.join(folder, 'README.md')
              if os.path.exists(sub_readme_path):
                  with open(sub_readme_path, 'r', encoding='utf-8') as rf:
                      content = rf.read()
                      if 'Easy' in content: difficulty = 'Easy'
                      elif 'Medium' in content: difficulty = 'Medium'
                      elif 'Hard' in content: difficulty = 'Hard'

              date_str = datetime.today().strftime('%Y-%m-%d')
              
              # Build the native table row format
              table_lines.append(f"| {int(num)} | [{clean_name}](./{folder}) | {langs} | {difficulty} | {date_str} |")

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write('# LeetCode Practice Workspace\n\n\n')
              f.write('\n'.join(table_lines) + '\n')
          EOF
          python3 update_readme.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m 'Upgrade table layout to grid format' && git push)
